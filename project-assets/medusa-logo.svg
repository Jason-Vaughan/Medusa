<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <style>
      .golden { fill: #D4AF37; stroke: #B8941F; stroke-width: 1; }
      .black { fill: #000000; }
      .golden-stroke { fill: none; stroke: #D4AF37; stroke-width: 3; }
    </style>
  </defs>
  
  <!-- Black background circle -->
  <circle cx="400" cy="400" r="390" class="black"/>
  <circle cx="400" cy="400" r="390" class="golden-stroke"/>
  
  <!-- Left Medusa Head -->
  <g transform="translate(200, 300)">
    <!-- Face outline -->
    <path d="M80 120 Q50 100 40 80 Q35 60 45 45 Q60 35 80 40 Q100 50 110 70 Q115 90 105 110 Q95 125 80 120 Z" class="golden"/>
    
    <!-- Eye -->
    <ellipse cx="70" cy="80" rx="8" ry="12" class="black"/>
    
    <!-- Mouth (open, hissing) -->
    <path d="M85 100 Q95 110 105 100 Q100 115 95 120 Q90 115 85 100 Z" class="black"/>
    
    <!-- Teeth -->
    <rect x="88" y="105" width="3" height="8" class="golden"/>
    <rect x="92" y="105" width="3" height="8" class="golden"/>
    <rect x="96" y="105" width="3" height="8" class="golden"/>
    <rect x="100" y="105" width="3" height="8" class="golden"/>
    
    <!-- Snake Hair - Multiple serpents -->
    <path d="M45 45 Q25 25 15 10 Q5 0 0 -10 Q-5 -20 0 -25 Q10 -20 15 -10 Q25 5 35 20 Q45 35 50 50" class="golden"/>
    <path d="M60 35 Q45 15 35 0 Q25 -15 30 -25 Q40 -30 45 -20 Q50 -5 55 10 Q60 25 65 40" class="golden"/>
    <path d="M80 30 Q75 10 70 -5 Q65 -20 70 -30 Q80 -35 85 -25 Q90 -10 85 5 Q80 20 75 35" class="golden"/>
    <path d="M100 35 Q105 15 110 0 Q115 -15 110 -25 Q100 -30 95 -20 Q90 -5 95 10 Q100 25 105 40" class="golden"/>
    <path d="M115 45 Q135 25 145 10 Q155 0 160 -10 Q165 -20 160 -25 Q150 -20 145 -10 Q135 5 125 20 Q115 35 110 50" class="golden"/>
    
    <!-- Snake scales on hair -->
    <circle cx="10" cy="-15" r="2" class="black"/>
    <circle cx="40" cy="-20" r="2" class="black"/>
    <circle cx="75" cy="-25" r="2" class="black"/>
    <circle cx="100" cy="-20" r="2" class="black"/>
    <circle cx="150" cy="-15" r="2" class="black"/>
  </g>
  
  <!-- Right Medusa Head (mirrored) -->
  <g transform="translate(600, 300) scale(-1, 1)">
    <!-- Face outline -->
    <path d="M80 120 Q50 100 40 80 Q35 60 45 45 Q60 35 80 40 Q100 50 110 70 Q115 90 105 110 Q95 125 80 120 Z" class="golden"/>
    
    <!-- Eye -->
    <ellipse cx="70" cy="80" rx="8" ry="12" class="black"/>
    
    <!-- Mouth (open, hissing) -->
    <path d="M85 100 Q95 110 105 100 Q100 115 95 120 Q90 115 85 100 Z" class="black"/>
    
    <!-- Teeth -->
    <rect x="88" y="105" width="3" height="8" class="golden"/>
    <rect x="92" y="105" width="3" height="8" class="golden"/>
    <rect x="96" y="105" width="3" height="8" class="golden"/>
    <rect x="100" y="105" width="3" height="8" class="golden"/>
    
    <!-- Snake Hair - Multiple serpents -->
    <path d="M45 45 Q25 25 15 10 Q5 0 0 -10 Q-5 -20 0 -25 Q10 -20 15 -10 Q25 5 35 20 Q45 35 50 50" class="golden"/>
    <path d="M60 35 Q45 15 35 0 Q25 -15 30 -25 Q40 -30 45 -20 Q50 -5 55 10 Q60 25 65 40" class="golden"/>
    <path d="M80 30 Q75 10 70 -5 Q65 -20 70 -30 Q80 -35 85 -25 Q90 -10 85 5 Q80 20 75 35" class="golden"/>
    <path d="M100 35 Q105 15 110 0 Q115 -15 110 -25 Q100 -30 95 -20 Q90 -5 95 10 Q100 25 105 40" class="golden"/>
    <path d="M115 45 Q135 25 145 10 Q155 0 160 -10 Q165 -20 160 -25 Q150 -20 145 -10 Q135 5 125 20 Q115 35 110 50" class="golden"/>
    
    <!-- Snake scales on hair -->
    <circle cx="10" cy="-15" r="2" class="black"/>
    <circle cx="40" cy="-20" r="2" class="black"/>
    <circle cx="75" cy="-25" r="2" class="black"/>
    <circle cx="100" cy="-20" r="2" class="black"/>
    <circle cx="150" cy="-15" r="2" class="black"/>
  </g>
  
  <!-- Central bridge/connection element -->
  <rect x="350" y="390" width="100" height="20" rx="10" class="golden"/>
  <rect x="360" y="395" width="80" height="10" rx="5" class="black"/>
  
  <!-- Decorative elements around the connection -->
  <circle cx="340" cy="400" r="8" class="golden"/>
  <circle cx="460" cy="400" r="8" class="golden"/>
  <circle cx="345" cy="400" r="3" class="black"/>
  <circle cx="455" cy="400" r="3" class="black"/>
</svg> 